<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Sniper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }

        header p {
            color: #8b949e;
            font-size: 0.9rem;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
        }

        .card h2 {
            font-size: 1rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        /* Add section */
        .add-row {
            display: flex;
            gap: 0.5rem;
        }

        input, select {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e1e4e8;
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
        }

        input:focus {
            border-color: #58a6ff;
        }

        input::placeholder {
            color: #484f58;
        }

        .add-row input { flex: 1; }

        button {
            background: #238636;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.15s;
        }

        button:hover { background: #2ea043; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-danger { background: #da3633; }
        .btn-danger:hover { background: #f85149; }

        .btn-blue { background: #1f6feb; }
        .btn-blue:hover { background: #388bfd; }

        .btn-outline {
            background: transparent;
            border: 1px solid #30363d;
            color: #8b949e;
        }
        .btn-outline:hover { border-color: #58a6ff; color: #58a6ff; }

        .btn-sm {
            padding: 0.3rem 0.7rem;
            font-size: 0.8rem;
        }

        /* Sections table */
        .sections-list { list-style: none; }

        .section-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #21262d;
        }

        .section-item:last-child { border-bottom: none; }

        .section-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.open { background: #3fb950; box-shadow: 0 0 6px #3fb95066; }
        .status-dot.full { background: #f85149; }
        .status-dot.error { background: #484f58; }

        .section-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .section-detail {
            color: #8b949e;
            font-size: 0.85rem;
        }

        .empty-state {
            text-align: center;
            color: #484f58;
            padding: 2rem;
            font-size: 0.9rem;
        }

        /* Config form */
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .config-grid label {
            font-size: 0.8rem;
            color: #8b949e;
            margin-bottom: 0.2rem;
            display: block;
        }

        .config-grid .field { display: flex; flex-direction: column; }
        .config-grid .full-width { grid-column: 1 / -1; }

        .config-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        /* Monitor */
        .monitor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .monitor-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3fb950;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .log-box {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            color: #8b949e;
        }

        .log-box .log-open { color: #3fb950; }
        .log-box .log-full { color: #f85149; }
        .log-box .log-email { color: #58a6ff; }
        .log-box .log-warn { color: #d29922; }
        .log-box .log-error { color: #f85149; font-weight: bold; }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: #161b22;
            border: 1px solid #30363d;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-size: 0.85rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success { border-color: #238636; }
        .toast.error { border-color: #da3633; }

        @media (max-width: 600px) {
            .config-grid { grid-template-columns: 1fr; }
            .add-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Course Sniper</h1>
            <p>UCI enrollment monitor — get notified when spots open up</p>
        </header>

        <!-- Add Section -->
        <div class="card">
            <h2>Add Section</h2>
            <div class="add-row">
                <input type="text" id="addCode" placeholder="5-digit section code (e.g. 34190)"
                       maxlength="5" pattern="\d{5}">
                <button onclick="addSection()" class="btn-blue">Add to Watch List</button>
                <button onclick="quickCheck()" class="btn-outline">Quick Check</button>
            </div>
            <div id="quickCheckResult" style="margin-top: 0.75rem; display: none;"></div>
        </div>

        <!-- Watched Sections -->
        <div class="card">
            <h2>Watch List</h2>
            <ul class="sections-list" id="sectionsList">
                <li class="empty-state">Loading...</li>
            </ul>
        </div>

        <!-- Monitor -->
        <div class="card">
            <div class="monitor-header">
                <h2 style="margin-bottom: 0;">Monitor</h2>
                <div>
                    <button id="startBtn" onclick="startMonitor()" class="btn-blue btn-sm">Start</button>
                    <button id="stopBtn" onclick="stopMonitor()" class="btn-danger btn-sm" disabled>Stop</button>
                </div>
            </div>
            <div class="monitor-status" id="monitorStatus">
                <span style="color: #484f58;">Stopped</span>
            </div>
            <div class="log-box" id="logBox" style="margin-top: 0.75rem;">
                <div style="color: #484f58;">No log entries yet. Start the monitor to begin watching.</div>
            </div>
        </div>

        <!-- Settings -->
        <div class="card">
            <h2>Settings</h2>
            <div class="config-grid">
                <div class="field">
                    <label>Term</label>
                    <input type="text" id="cfgTerm" placeholder="2026 Fall">
                </div>
                <div class="field">
                    <label>Check Interval (seconds)</label>
                    <input type="number" id="cfgInterval" min="10" placeholder="30">
                </div>
                <div class="field">
                    <label>Sender Email (Gmail)</label>
                    <input type="email" id="cfgSender" placeholder="you@gmail.com">
                </div>
                <div class="field">
                    <label>App Password</label>
                    <input type="password" id="cfgPassword" placeholder="Enter to change">
                </div>
                <div class="field full-width">
                    <label>Notification Email</label>
                    <input type="email" id="cfgRecipient" placeholder="notify@example.com">
                </div>
            </div>
            <div class="config-actions">
                <button onclick="saveConfig()">Save Settings</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let refreshTimer = null;

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast show ${type}`;
            setTimeout(() => t.className = 'toast', 2500);
        }

        async function api(path, opts = {}) {
            const res = await fetch(path, {
                headers: { 'Content-Type': 'application/json' },
                ...opts,
                body: opts.body ? JSON.stringify(opts.body) : undefined,
            });
            return res.json();
        }

        async function refresh() {
            const data = await api('/api/status');

            // Sections
            const list = document.getElementById('sectionsList');
            if (data.sections.length === 0) {
                list.innerHTML = '<li class="empty-state">No sections watched yet. Add a section code above.</li>';
            } else {
                list.innerHTML = data.sections.map(s => {
                    if (s.error) {
                        return `<li class="section-item">
                            <div class="section-info">
                                <div class="status-dot error"></div>
                                <div>
                                    <div class="section-name">${s.section_code}</div>
                                    <div class="section-detail">Could not fetch info</div>
                                </div>
                            </div>
                            <button class="btn-danger btn-sm" onclick="removeSection('${s.section_code}')">Remove</button>
                        </li>`;
                    }
                    const dotClass = s.is_open ? 'open' : 'full';
                    const statusText = s.is_open ? 'OPEN' : 'FULL';
                    return `<li class="section-item">
                        <div class="section-info">
                            <div class="status-dot ${dotClass}"></div>
                            <div>
                                <div class="section-name">${s.dept} ${s.course_number} — ${s.course_title}</div>
                                <div class="section-detail">
                                    ${s.section_code} · ${s.section_type} · ${statusText} ·
                                    ${s.enrolled}/${s.max_capacity} enrolled ·
                                    ${s.instructors && s.instructors.length ? s.instructors.join(', ') : 'TBA'}
                                </div>
                            </div>
                        </div>
                        <button class="btn-danger btn-sm" onclick="removeSection('${s.section_code}')">Remove</button>
                    </li>`;
                }).join('');
            }

            // Monitor
            const monStatus = document.getElementById('monitorStatus');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');

            if (data.monitor_running) {
                monStatus.innerHTML = '<div class="pulse"></div> <span style="color: #3fb950;">Running</span>';
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else {
                monStatus.innerHTML = '<span style="color: #484f58;">Stopped</span>';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }

            // Log
            const logBox = document.getElementById('logBox');
            if (data.log.length > 0) {
                logBox.innerHTML = data.log.map(line => {
                    let cls = '';
                    if (line.includes('OPEN')) cls = 'log-open';
                    else if (line.includes('FULL')) cls = 'log-full';
                    else if (line.includes('EMAIL')) cls = 'log-email';
                    else if (line.includes('WARN')) cls = 'log-warn';
                    else if (line.includes('ERROR')) cls = 'log-error';
                    return `<div class="${cls}">${line}</div>`;
                }).join('');
                logBox.scrollTop = logBox.scrollHeight;
            }

            // Config
            const c = data.config;
            document.getElementById('cfgTerm').value = c.term;
            document.getElementById('cfgInterval').value = c.check_interval_seconds;
            document.getElementById('cfgSender').value = c.sender_email;
            document.getElementById('cfgRecipient').value = c.recipient_email;
            document.getElementById('cfgPassword').placeholder = c.has_password ? '••••••••' : 'Not set';
        }

        async function addSection() {
            const code = document.getElementById('addCode').value.trim();
            const res = await api('/api/add', { method: 'POST', body: { section_code: code } });
            if (res.ok) {
                document.getElementById('addCode').value = '';
                showToast(res.message);
                refresh();
            } else {
                showToast(res.error, 'error');
            }
        }

        async function removeSection(code) {
            const res = await api('/api/remove', { method: 'POST', body: { section_code: code } });
            if (res.ok) {
                showToast(res.message);
                refresh();
            } else {
                showToast(res.error, 'error');
            }
        }

        async function quickCheck() {
            const code = document.getElementById('addCode').value.trim();
            if (!code) return;

            const box = document.getElementById('quickCheckResult');
            box.style.display = 'block';
            box.innerHTML = '<span style="color: #8b949e;">Checking...</span>';

            const res = await api(`/api/check/${code}`);
            if (res.ok) {
                const s = res.section;
                const color = s.is_open ? '#3fb950' : '#f85149';
                const status = s.is_open ? 'OPEN' : 'FULL';
                box.innerHTML = `
                    <span style="color: ${color}; font-weight: 600;">${status}</span> —
                    ${s.dept} ${s.course_number} (${s.course_title}) ·
                    ${s.enrolled}/${s.max_capacity} ·
                    ${s.instructors.length ? s.instructors.join(', ') : 'TBA'}
                `;
            } else {
                box.innerHTML = `<span style="color: #f85149;">${res.error}</span>`;
            }
        }

        async function saveConfig() {
            const body = {
                term: document.getElementById('cfgTerm').value,
                check_interval_seconds: document.getElementById('cfgInterval').value,
                sender_email: document.getElementById('cfgSender').value,
                recipient_email: document.getElementById('cfgRecipient').value,
            };
            const pw = document.getElementById('cfgPassword').value;
            if (pw) body.sender_password = pw;

            const res = await api('/api/config', { method: 'POST', body });
            if (res.ok) {
                document.getElementById('cfgPassword').value = '';
                showToast('Settings saved');
                refresh();
            } else {
                showToast(res.error || 'Failed to save', 'error');
            }
        }

        async function startMonitor() {
            const res = await api('/api/monitor/start', { method: 'POST' });
            if (res.ok) {
                showToast('Monitor started');
                // Poll more frequently while running
                clearInterval(refreshTimer);
                refreshTimer = setInterval(refresh, 5000);
                refresh();
            } else {
                showToast(res.error, 'error');
            }
        }

        async function stopMonitor() {
            const res = await api('/api/monitor/stop', { method: 'POST' });
            if (res.ok) {
                showToast('Monitor stopped');
                clearInterval(refreshTimer);
                refreshTimer = setInterval(refresh, 15000);
                refresh();
            } else {
                showToast(res.error, 'error');
            }
        }

        // Enter key to add
        document.getElementById('addCode').addEventListener('keydown', e => {
            if (e.key === 'Enter') addSection();
        });

        // Initial load + auto-refresh
        refresh();
        refreshTimer = setInterval(refresh, 15000);
    </script>
</body>
</html>
